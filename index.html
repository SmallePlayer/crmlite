<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Калькулятор упаковки товара | Таблица стоимости</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }
    body {
      background: #f4f6f9;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
    }
    .container {
      width: 100%;
      max-width: 1400px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.05);
      padding: 25px 30px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    h1 i {
      color: #3b82f6;
      font-size: 2rem;
    }
    .subtitle {
      color: #64748b;
      margin-bottom: 28px;
      font-size: 0.95rem;
      border-left: 4px solid #3b82f6;
      padding-left: 16px;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .btn {
      background: white;
      border: 1px solid #e2e8f0;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #1e293b;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }
    .btn-primary {
      background: #3b82f6;
      border: 1px solid #3b82f6;
      color: white;
      box-shadow: 0 8px 16px rgba(59,130,246,0.2);
    }
    .btn-primary:hover {
      background: #2563eb;
    }
    .btn:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
    }
    .btn-primary:hover {
      background: #2563eb;
      border-color: #2563eb;
    }
    .btn-danger {
      background: white;
      border: 1px solid #e2e8f0;
      color: #64748b;
    }
    .btn-danger:hover {
      background: #fee2e2;
      color: #ef4444;
      border-color: #fecaca;
    }
    .table-wrapper {
      overflow-x: auto;
      border-radius: 18px;
      border: 1px solid #edf2f7;
      background: #ffffff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
      white-space: nowrap;
    }
    th {
      background: #f8fafc;
      padding: 16px 12px;
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #475569;
      border-bottom: 2px solid #e2e8f0;
      text-align: left;
    }
    th:first-child {
      text-align: center;
      width: 50px;
    }
    td {
      padding: 14px 12px;
      border-bottom: 1px solid #f1f5f9;
      color: #1e293b;
      font-size: 0.9rem;
      vertical-align: middle;
    }
    td:first-child {
      text-align: center;
    }
    .article-number {
      font-weight: 700;
      color: #3b82f6;
      font-size: 1rem;
      background: #f0f9ff;
      border-radius: 8px;
      padding: 4px 8px;
      display: inline-block;
      min-width: 30px;
    }
    .product-image {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      object-fit: cover;
      background: #f1f5f9;
      border: 2px dashed #cbd5e1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .product-image:hover {
      border-color: #3b82f6;
      background: #f0f9ff;
    }
    .product-image.has-image {
      border: 2px solid #e2e8f0;
    }
    .product-image.has-image:hover {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    .image-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .product-image:hover .image-overlay {
      opacity: 1;
    }
    .image-overlay i {
      color: white;
      font-size: 1.2rem;
    }
    .file-input-hidden {
      display: none;
    }
    input, select {
      padding: 8px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.9rem;
      background: white;
      width: 100%;
      min-width: 90px;
      transition: 0.2s;
      color: #0f172a;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    .unit-select {
      width: auto;
      min-width: 80px;
    }
    .calculated-price {
      background: #f1f5f9;
      border-radius: 10px;
      padding: 6px 12px;
      font-weight: 600;
      color: #0f172a;
      display: inline-block;
      min-width: 90px;
      text-align: center;
    }
    .calculated-price.empty {
      color: #94a3b8;
      font-weight: 400;
      background: #f8fafc;
    }
    .action-btns {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .icon-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 6px;
      border-radius: 8px;
      color: #64748b;
      transition: 0.2s;
    }
    .icon-btn:hover {
      background: #f1f5f9;
      color: #1e293b;
    }
    .delete-btn:hover {
      color: #ef4444;
      background: #fee2e2;
    }
    .empty-message {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
      font-style: italic;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>
    <i class="fas fa-box-open"></i> Стоимость упаковки
  </h1>
  <div class="subtitle">
    Добавляйте товары, загружайте изображения и рассчитывайте цену за единицу измерения
  </div>

  <div class="toolbar">
    <div style="display: flex; gap: 10px; align-items: center;">
      <button class="btn btn-primary" id="addRowBtn">
        <i class="fas fa-plus-circle"></i> Добавить товар
      </button>
      <button class="btn btn-danger" id="clearAllBtn">
        <i class="fas fa-trash-alt"></i> Очистить всё
      </button>
    </div>
    <span style="display: flex; align-items: center; background: #f8fafc; padding: 5px 15px; border-radius: 20px; color: #475569;">
      <i class="far fa-file-alt" style="margin-right: 8px;"></i> <span id="rowCount">0</span> позиций
    </span>
  </div>

  <div class="table-wrapper">
    <table id="productTable">
      <thead>
         <tr>
            <th>№</th>
            <th>Изображение</th>
            <th>Наименование товара</th>
            <th>Кол-во в упаковке</th>
            <th>Ед. изм.</th>
            <th>Цена за упаковку (₽)</th>
            <th>Цена за единицу</th>
            <th style="text-align: center;">Действия</th>
         </tr>
      </thead>
      <tbody id="tableBody">
      </tbody>
    </table>
    <div id="emptyPlaceholder" class="empty-message">
      <i class="fas fa-inbox" style="font-size: 2rem; margin-bottom: 10px; display: block;"></i>
      Нет добавленных товаров. Нажмите «Добавить товар», чтобы начать.
    </div>
  </div>
</div>

<script>
  (function() {
    const STORAGE_KEY = 'packCalcProducts';
    const MAX_IMAGE_SIZE = 10 * 1024 * 1024; // 10 MB
    const MAX_IMAGE_DIMENSION = 1200;
    const JPEG_QUALITY = 0.85;
    
    let products = [];
    let nextId = 1;

    const tbody = document.getElementById('tableBody');
    const emptyPlaceholder = document.getElementById('emptyPlaceholder');
    const rowCountSpan = document.getElementById('rowCount');
    const addRowBtn = document.getElementById('addRowBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');

    // Функция для оптимизации изображения
    function optimizeImage(imageDataUrl, maxDimension = MAX_IMAGE_DIMENSION, quality = JPEG_QUALITY) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = function() {
          if (img.width <= maxDimension && img.height <= maxDimension && imageDataUrl.length < 500000) {
            resolve(imageDataUrl);
            return;
          }

          let width = img.width;
          let height = img.height;
          
          if (width > height) {
            if (width > maxDimension) {
              height = Math.round(height * (maxDimension / width));
              width = maxDimension;
            }
          } else {
            if (height > maxDimension) {
              width = Math.round(width * (maxDimension / height));
              height = maxDimension;
            }
          }

          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
          resolve(compressedDataUrl);
        };
        img.onerror = function() {
          reject(new Error('Ошибка загрузки изображения'));
        };
        img.src = imageDataUrl;
      });
    }

    function saveToStorage() {
      try {
        const data = {
          products: products.map(p => ({
            id: p.id,
            name: p.name,
            imageData: p.imageData,
            quantity: p.quantity,
            unit: p.unit,
            packPrice: p.packPrice,
            pricePerUnit: p.pricePerUnit
          })),
          nextId: nextId
        };
        
        const jsonString = JSON.stringify(data);
        localStorage.setItem(STORAGE_KEY, jsonString);
      } catch (e) {
        console.error('Ошибка сохранения:', e);
        if (e.name === 'QuotaExceededError') {
          alert('Хранилище браузера переполнено! Пожалуйста, удалите некоторые товары или используйте изображения меньшего размера.');
          try {
            const dataWithoutImages = {
              products: products.map(p => ({
                ...p,
                imageData: null
              })),
              nextId: nextId
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(dataWithoutImages));
            alert('Данные сохранены без изображений.');
          } catch (e2) {
            console.error('Не удалось сохранить даже без изображений:', e2);
          }
        }
      }
    }

    function loadFromStorage() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const data = JSON.parse(saved);
          if (data.products && Array.isArray(data.products)) {
            products = data.products.map(p => ({
              id: p.id,
              name: p.name || '',
              imageData: p.imageData || null,
              quantity: p.quantity || '',
              unit: p.unit || 'шт',
              packPrice: p.packPrice || '',
              pricePerUnit: p.pricePerUnit || null
            }));
            products = products.map(p => recalcProduct(p));
            nextId = data.nextId || 1;
            return true;
          }
        }
      } catch (e) {
        console.error('Ошибка загрузки:', e);
      }
      return false;
    }

    function formatPrice(value) {
      if (value === null || value === undefined || isNaN(value)) return null;
      return value.toFixed(2);
    }

    function recalcProduct(product) {
      const qty = parseFloat(product.quantity) || 0;
      const packPrice = parseFloat(product.packPrice) || 0;
      const unit = product.unit || 'шт';

      let pricePerUnit = null;
      if (qty > 0 && packPrice > 0) {
        pricePerUnit = packPrice / qty;
      }

      return {
        ...product,
        pricePerUnit: pricePerUnit
      };
    }

    // Обновление только отображаемой цены без перерисовки всей таблицы
    function updatePriceDisplay(productId) {
      const product = products.find(p => p.id === productId);
      if (!product) return;
      
      const row = document.querySelector(`tr[data-id='${productId}']`);
      if (!row) return;
      
      const priceCell = row.querySelector('.calculated-price');
      if (!priceCell) return;
      
      const unitPrice = formatPrice(product.pricePerUnit);
      const unitLabel = product.unit === 'шт' ? '₽/шт' : '₽/м²';
      
      if (unitPrice) {
        priceCell.textContent = unitPrice + ' ' + unitLabel;
        priceCell.classList.remove('empty');
      } else {
        priceCell.textContent = '—';
        priceCell.classList.add('empty');
      }
    }

    function renderTable() {
      if (!tbody) return;
      
      // Сохраняем информацию о активном элементе
      const activeElement = document.activeElement;
      const activeElementId = activeElement ? parseInt(activeElement.getAttribute('data-id')) : null;
      const activeElementClass = activeElement ? activeElement.className : null;
      
      tbody.innerHTML = '';

      if (products.length === 0) {
        emptyPlaceholder.style.display = 'block';
        rowCountSpan.textContent = '0';
        return;
      }

      emptyPlaceholder.style.display = 'none';
      rowCountSpan.textContent = products.length;

      products.forEach((prod, index) => {
        const row = document.createElement('tr');
        row.setAttribute('data-id', prod.id);

        const articleNumber = index + 1; // Автоматическая нумерация
        
        const hasImage = prod.imageData && prod.imageData.startsWith('data:image');
        
        const imageHtml = hasImage 
          ? `<div style="position: relative; cursor: pointer;" class="image-click-area">
               <img src="${prod.imageData}" alt="товар" class="product-image has-image" />
               <div class="image-overlay">
                 <i class="fas fa-camera"></i>
               </div>
               <input type="file" accept="image/*" class="file-input-hidden image-input" data-id="${prod.id}" />
             </div>`
          : `<div style="position: relative; cursor: pointer;" class="image-click-area">
               <div class="product-image">
                 <i class="fas fa-image"></i>
               </div>
               <div class="image-overlay">
                 <i class="fas fa-camera"></i>
               </div>
               <input type="file" accept="image/*" class="file-input-hidden image-input" data-id="${prod.id}" />
             </div>`;

        const qtyVal = prod.quantity ?? '';
        const packPriceVal = prod.packPrice ?? '';
        const unitVal = prod.unit || 'шт';
        
        const unitPrice = formatPrice(prod.pricePerUnit);
        const unitLabel = unitVal === 'шт' ? '₽/шт' : '₽/м²';

        row.innerHTML = `
          <td>
            <span class="article-number">${articleNumber}</span>
          </td>
          <td>
            ${imageHtml}
          </td>
          <td>
            <input type="text" class="name-input" value="${escapeHtml(prod.name || '')}" placeholder="Название товара" data-id="${prod.id}">
          </td>
          <td>
            <input type="number" class="qty-input" value="${qtyVal}" step="any" min="0" placeholder="0" data-id="${prod.id}">
          </td>
          <td>
            <select class="unit-select" data-id="${prod.id}">
              <option value="шт" ${unitVal === 'шт' ? 'selected' : ''}>шт</option>
              <option value="м²" ${unitVal === 'м²' ? 'selected' : ''}>м²</option>
            </select>
          </td>
          <td>
            <input type="number" class="pack-price-input" value="${packPriceVal}" step="any" min="0" placeholder="0.00" data-id="${prod.id}">
          </td>
          <td>
            <span class="calculated-price ${!unitPrice ? 'empty' : ''}">
              ${unitPrice ? unitPrice + ' ' + unitLabel : '—'}
            </span>
          </td>
          <td>
            <div class="action-btns">
              <button class="icon-btn delete-btn" title="Удалить товар" data-id="${prod.id}">
                <i class="fas fa-trash-can"></i>
              </button>
            </div>
          </td>
        `;

        tbody.appendChild(row);
      });
      
      // Восстанавливаем фокус на активном элементе
      if (activeElementId && activeElementClass) {
        setTimeout(() => {
          const elementToFocus = document.querySelector(`[data-id="${activeElementId}"].${activeElementClass.split(' ')[0]}`);
          if (elementToFocus) {
            elementToFocus.focus();
            // Восстанавливаем позицию курсора в конец
            if (elementToFocus.type === 'text' || elementToFocus.type === 'number') {
              const length = elementToFocus.value.length;
              elementToFocus.setSelectionRange(length, length);
            }
          }
        }, 0);
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function updateProductById(id, updates, shouldRender = true) {
      const index = products.findIndex(p => p.id === id);
      if (index === -1) return;
      
      products[index] = { ...products[index], ...updates };
      products[index] = recalcProduct(products[index]);
      
      if (shouldRender) {
        renderTable();
      } else {
        // Обновляем только отображение цены
        updatePriceDisplay(id);
      }
      
      saveToStorage();
    }

    function deleteProductById(id) {
      products = products.filter(p => p.id !== id);
      renderTable();
      saveToStorage();
    }

    function addNewProduct() {
      const newProduct = {
        id: nextId++,
        name: '',
        imageData: null,
        quantity: '',
        unit: 'шт',
        packPrice: '',
        pricePerUnit: null
      };
      products.push(newProduct);
      renderTable();
      saveToStorage();
      
      // Фокус на название нового товара
      setTimeout(() => {
        const newRow = document.querySelector(`tr[data-id='${newProduct.id}']`);
        if (newRow) {
          const nameInput = newRow.querySelector('.name-input');
          if (nameInput) nameInput.focus();
        }
      }, 0);
    }

    function clearAllProducts() {
      if (confirm('Вы уверены, что хотите удалить все товары? Это действие нельзя отменить.')) {
        products = [];
        renderTable();
        saveToStorage();
      }
    }

    async function handleImageUpload(file, productId) {
      if (!file) return;
      
      if (file.size > MAX_IMAGE_SIZE) {
        alert(`Файл слишком большой! Максимальный размер: ${MAX_IMAGE_SIZE / (1024 * 1024)} MB.`);
        return;
      }
      
      try {
        const reader = new FileReader();
        reader.onload = async function(e) {
          try {
            const optimizedImage = await optimizeImage(e.target.result);
            updateProductById(productId, { imageData: optimizedImage }, true);
          } catch (error) {
            console.error('Ошибка оптимизации:', error);
            updateProductById(productId, { imageData: e.target.result }, true);
          }
        };
        reader.onerror = function() {
          alert('Ошибка при чтении файла');
        };
        reader.readAsDataURL(file);
      } catch (error) {
        console.error('Ошибка загрузки изображения:', error);
        alert('Не удалось загрузить изображение');
      }
    }

    // Обработчики событий
    tbody.addEventListener('click', function(e) {
      const target = e.target;
      
      const imageArea = target.closest('.image-click-area');
      if (imageArea) {
        const fileInput = imageArea.querySelector('.image-input');
        if (fileInput) {
          fileInput.click();
        }
        return;
      }

      const deleteBtn = target.closest('.delete-btn');
      if (deleteBtn) {
        const id = parseInt(deleteBtn.getAttribute('data-id'), 10);
        if (!isNaN(id)) {
          if (confirm('Удалить этот товар?')) {
            deleteProductById(id);
          }
        }
        return;
      }
    });

    // Используем input событие для мгновенного обновления цены
    tbody.addEventListener('input', function(e) {
      const el = e.target;
      const id = parseInt(el.getAttribute('data-id'), 10);
      if (isNaN(id)) return;

      if (el.classList.contains('name-input')) {
        const index = products.findIndex(p => p.id === id);
        if (index !== -1) {
          products[index].name = el.value;
          saveToStorage();
        }
      } else if (el.classList.contains('qty-input')) {
        // Обновляем без перерисовки
        updateProductById(id, { quantity: el.value }, false);
      } else if (el.classList.contains('pack-price-input')) {
        // Обновляем без перерисовки
        updateProductById(id, { packPrice: el.value }, false);
      }
    });

    tbody.addEventListener('change', function(e) {
      const el = e.target;
      const id = parseInt(el.getAttribute('data-id'), 10);
      if (isNaN(id)) return;

      if (el.classList.contains('unit-select')) {
        // Для смены единицы измерения нужна перерисовка
        updateProductById(id, { unit: el.value }, true);
      }
      
      if (el.classList.contains('image-input')) {
        const file = el.files[0];
        if (file) {
          handleImageUpload(file, id);
        }
        el.value = '';
      }
    });

    addRowBtn.addEventListener('click', addNewProduct);
    clearAllBtn.addEventListener('click', clearAllProducts);

    // Инициализация
    function initialize() {
      const loaded = loadFromStorage();
      
      if (!loaded || products.length === 0) {
        products = [
          {
            id: nextId++,
            name: 'Керамогранит',
            imageData: null,
            quantity: '1.44',
            unit: 'м²',
            packPrice: '2150',
            pricePerUnit: null
          },
          {
            id: nextId++,
            name: 'Светильник LED',
            imageData: null,
            quantity: '4',
            unit: 'шт',
            packPrice: '3200',
            pricePerUnit: null
          }
        ];
        
        products = products.map(p => recalcProduct(p));
        renderTable();
        saveToStorage();
      } else {
        renderTable();
      }
    }

    initialize();

    window.addEventListener('beforeunload', () => {
      saveToStorage();
    });

  })();
</script>
</body>
</html>
