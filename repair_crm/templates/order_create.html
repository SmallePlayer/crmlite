{% extends "base.html" %}
{% set current_page = "orders" %}

{% block content %}
<h4 class="mb-4">Новый заказ</h4>

<div class="row">
  <div class="col-12 col-lg-7">
    <form method="post" action="/orders" class="card shadow-sm">
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label">Тип заказа <span class="text-danger">*</span></label>
          <select name="order_type" class="form-select" id="orderType" onchange="onTypeChange()">
            {% for t_val, (t_label, t_icon) in ORDER_TYPES.items() %}
            <option value="{{ t_val }}">{{ t_label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Клиент <span class="text-danger">*</span></label>
          <input type="text" id="clientFilter" class="form-control mb-2"
                 placeholder="Поиск по имени или телефону..."
                 onkeyup="filterClients()" autocomplete="off">
          <select name="client_id" id="clientSelect" class="form-select" size="8" required>
            {% for c in clients %}
            <option value="{{ c.id }}">{{ c.full_name }} — {{ c.phone }}</option>
            {% endfor %}
          </select>
          <div class="form-text">
            Нет в списке? <a href="/clients" target="_blank">Создать клиента</a>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label" id="deviceLabel">Принтер <span class="text-danger">*</span></label>
          <input type="text" name="printer" class="form-control"
                 placeholder="Например: Ender 3 V2" required autocomplete="off">
        </div>
        <div class="mb-3">
          <label class="form-label" id="defectLabel">Описание <span class="text-danger">*</span></label>
          <textarea name="defect" class="form-control" rows="4"
                    placeholder="Опишите неисправность или задачу..."
                    required></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label">Мастер</label>
          <select name="assigned_to" class="form-select">
            <option value="0">— Не назначен —</option>
            {% for u in users %}
            <option value="{{ u.id }}" {% if u.id == user.id %}selected{% endif %}>{{ u.full_name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="is_warranty" value="1" id="warrantyCheck">
            <label class="form-check-label" for="warrantyCheck">Гарантийный заказ</label>
          </div>
        </div>
        <hr>
        {# Repair: выезд #}
        <div id="repairFields">
          <h6 class="mb-3"><i class="bi bi-calendar-event me-1"></i>Выезд к клиенту</h6>
          <div class="row g-2 mb-3">
            <div class="col-md-4">
              <label class="form-label">Дата</label>
              <input type="date" name="scheduled_date" id="schedDate" class="form-control"
                     onchange="updateScheduledAt()">
            </div>
            <div class="col-md-3">
              <label class="form-label">Время</label>
              <input type="time" name="scheduled_time" id="schedTime" class="form-control"
                     value="10:00" onchange="updateScheduledAt()">
            </div>
            <div class="col-md-5">
              <label class="form-label">Адрес</label>
              <input type="text" name="schedule_location" class="form-control"
                     placeholder="Улица, дом, подъезд..." autocomplete="off">
            </div>
          </div>
        </div>
        {# Print: дата принятия + дата сдачи #}
        <div id="printFields" style="display:none">
          <h6 class="mb-3"><i class="bi bi-calendar-check me-1"></i>Сроки</h6>
          <div class="row g-2 mb-3">
            <div class="col-md-6">
              <label class="form-label">Дата принятия</label>
              <input type="date" name="scheduled_date_print" class="form-control" id="acceptDate"
                     onchange="updateSchedPrint()">
            </div>
            <div class="col-md-6">
              <label class="form-label">Дата сдачи</label>
              <input type="date" name="deadline" class="form-control" id="deadlineDate"
                     onchange="updateSchedPrint()">
            </div>
          </div>
        </div>
        <input type="hidden" name="scheduled_at" id="scheduledAt">
        <h6 class="mb-3 mt-3"><i class="bi bi-cash-coin me-1"></i>Оплата</h6>
        <div class="row g-2 mb-3">
          <div class="col-md-4">
            <label class="form-label">Предоплата (₽)</label>
            <input type="number" name="prepaid" class="form-control" min="0" step="1" value="0">
          </div>
          <div class="col-md-4">
            <label class="form-label">Оценка стоимости (₽)</label>
            <input type="number" name="estimated_price" class="form-control" min="0" step="1" value="0">
          </div>
        </div>
        <h6 class="mb-3 mt-3"><i class="bi bi-person-plus me-1"></i>Откуда клиент</h6>
        <div class="row g-2 mb-3">
          <div class="col-md-4">
            <select name="source" class="form-select" onchange="toggleSourceCustom()">
              <option value="">— —</option>
              <option value="Профи.ру">Профи.ру</option>
              <option value="Авито">Авито</option>
              <option value="Сарафанка">Сарафанка</option>
              <option value="__other__">Другое</option>
            </select>
            <input type="text" name="source_custom" class="form-control mt-1" style="display:none" placeholder="Откуда...">
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Создать заказ
          </button>
          <a href="/orders" class="btn btn-outline-secondary">Отмена</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function filterClients() {
  var q = document.getElementById('clientFilter').value.toLowerCase();
  document.querySelectorAll('#clientSelect option').forEach(function(o) {
    o.style.display = o.textContent.toLowerCase().indexOf(q) >= 0 ? '' : 'none';
  });
}
function onTypeChange() {
  var t = document.getElementById('orderType').value;
  var repair = document.getElementById('repairFields');
  var print = document.getElementById('printFields');
  if (t === 'print') {
    document.getElementById('deviceLabel').textContent = 'Модель/изделие *';
    document.getElementById('defectLabel').textContent = 'Задача / требования *';
    repair.style.display = 'none';
    print.style.display = '';
  } else {
    document.getElementById('deviceLabel').textContent = 'Принтер *';
    document.getElementById('defectLabel').textContent = 'Описание дефекта *';
    repair.style.display = '';
    print.style.display = 'none';
  }
}
function updateScheduledAt() {
  var d = document.getElementById('schedDate').value;
  var t = document.getElementById('schedTime').value;
  document.getElementById('scheduledAt').value = d && t ? d + 'T' + t : '';
}
function updateSchedPrint() {
  var d = document.getElementById('acceptDate').value;
  document.getElementById('scheduledAt').value = d ? d + 'T00:00' : '';
}
function toggleSourceCustom() {
  var sel = document.querySelector('[name=source]');
  var inp = document.querySelector('[name=source_custom]');
  inp.style.display = sel.value === '__other__' ? '' : 'none';
}
</script>
{% endblock %}
