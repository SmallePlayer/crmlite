<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRM — Вход</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: #1e293b; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.card { width: 100%; max-width: 400px; }
</style>
</head>
<body>
<div class="card p-4">
  <h3 class="text-center mb-4">CRM — Вход</h3>
  <form id="loginForm" onsubmit="return login(event)">
    <div class="mb-3">
      <label class="form-label">Логин</label>
      <input type="text" class="form-control" id="username" value="admin" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Пароль</label>
      <input type="password" class="form-control" id="password" value="admin123" required>
    </div>
    <div id="loginError" class="text-danger mb-2"></div>
    <button type="submit" class="btn btn-primary w-100">Войти</button>
  </form>
</div>
<script>
async function login(e) {
  e.preventDefault();
  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      username: document.getElementById('username').value,
      password: document.getElementById('password').value,
    }),
  });
  if (!res.ok) {
    const err = await res.json();
    document.getElementById('loginError').textContent = err.detail || 'Ошибка входа';
    return;
  }
  const data = await res.json();
  localStorage.setItem('token', data.token);
  localStorage.setItem('user', JSON.stringify(data.user));
  window.location.href = '/';
}
</script>
</body>
</html>
