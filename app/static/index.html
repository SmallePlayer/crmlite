<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRM — 3D Сервис</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f3;
  --sidebar-bg: #1a1410;
  --sidebar-hover: #2a221b;
  --accent: #d4783c;
  --accent-light: rgba(212, 120, 60, 0.12);
  --accent-hover: #b8642e;
  --card: #fff;
  --card-hover: #fcfaf8;
  --text: #1c1815;
  --text2: #6b625a;
  --text3: #999088;
  --border: #e8e3dd;
  --border-light: #f0ebe5;
  --table-head: #faf7f3;
  --input-bg: #fff;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.03);
  --shadow-md: 0 4px 16px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
  --shadow-lg: 0 20px 48px rgba(0,0,0,.1);
  --transition: 0.2s cubic-bezier(.4,0,.2,1);
}
body.dark {
  --bg: #12100e;
  --sidebar-bg: #0d0b09;
  --sidebar-hover: #1e1813;
  --accent: #e0925a;
  --accent-light: rgba(224, 146, 90, 0.15);
  --accent-hover: #c27840;
  --card: #1a1612;
  --card-hover: #211c17;
  --text: #e6ddd4;
  --text2: #9a8e84;
  --text3: #6e635b;
  --border: #2a241e;
  --border-light: #1f1a15;
  --table-head: #1f1a16;
  --input-bg: #1f1a15;
  --shadow: 0 1px 3px rgba(0,0,0,.2);
  --shadow-md: 0 4px 16px rgba(0,0,0,.3);
  --shadow-lg: 0 20px 48px rgba(0,0,0,.4);
}
* { box-sizing: border-box; }
body { 
  font-family: 'Inter', -apple-system, sans-serif; 
  background: var(--bg); color: var(--text);
  transition: background var(--transition), color var(--transition);
  margin: 0; min-height: 100vh;
}
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-hover); }

/* SIDEBAR */
.sidebar {
  position: sticky; top: 0; height: 100vh;
  background: var(--sidebar-bg);
  overflow-y: auto; z-index: 1020;
  transition: transform .3s ease;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 8px; }
.sidebar-brand {
  padding: 20px 22px 16px; border-bottom: 1px solid rgba(255,255,255,.06);
}
.sidebar-brand h4 { 
  color: #f0e8e0; font-weight: 800; font-size: 1.15rem; margin: 0; letter-spacing: -.3px; 
}
.sidebar-brand span { 
  color: var(--accent); font-size: .65rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; 
}
.sidebar-nav { padding: 8px 0; }
.sidebar-nav .nav-item { list-style: none; }
.nav-link {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 22px; color: #a3988d; font-size: .84rem; font-weight: 500;
  cursor: pointer; border-left: 3px solid transparent;
  transition: all var(--transition); text-decoration: none;
  user-select: none; border-radius: 0;
}
.nav-link:hover, .nav-link.active { 
  color: #f5ede5; background: var(--sidebar-hover); border-left-color: var(--accent); 
}
.nav-link .nav-icon { font-size: 1rem; width: 22px; text-align: center; flex-shrink: 0; }
.nav-link .badge-count { 
  background: var(--accent); color: #fff; font-size: .65rem; 
  padding: 1px 7px; border-radius: 10px; margin-left: auto; font-weight: 600; 
}
.sub-nav { overflow: hidden; max-height: 0; transition: max-height .3s ease; }
.sub-nav.open { max-height: 600px; }
.sub-link { padding-left: 54px !important; font-size: .8rem !important; }
.sub-link.active { border-left-color: #e0925a !important; }
.nav-section-title { 
  padding: 16px 22px 6px; font-size: .68rem; font-weight: 700; 
  text-transform: uppercase; letter-spacing: 1.2px; color: #5a5148; 
}
.sidebar-footer {
  border-top: 1px solid rgba(255,255,255,.06); padding: 16px 22px;
}

/* MAIN CONTENT */
.content { padding: 24px 28px; min-height: 100vh; }
.page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
.page-title { font-weight: 700; font-size: 1.2rem; margin: 0; letter-spacing: -.3px; }
.page-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* BUTTONS */
.btn { font-weight: 600; font-size: .82rem; border-radius: var(--radius-sm); padding: 7px 15px; transition: all var(--transition); cursor: pointer; border: 1px solid transparent; }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); box-shadow: 0 3px 12px rgba(212,120,60,.3); transform: translateY(-1px); }
.btn-outline { background: transparent; border-color: var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.btn-sm { padding: 5px 11px; font-size: .77rem; }
.btn-xs { padding: 3px 8px; font-size: .72rem; }
.btn-danger { background: #dc3545; border-color: #dc3545; color: #fff; }
.btn-danger:hover { background: #c82333; border-color: #bd2130; }
.btn-success { background: #198754; border-color: #198754; color: #fff; }
.btn-warning { background: #ffc107; border-color: #ffc107; color: #000; }
.btn-group { display: flex; gap: 6px; }

/* CARDS */
.card { 
  background: var(--card); border: 1px solid var(--border-light); border-radius: var(--radius); 
  box-shadow: var(--shadow); transition: all var(--transition);
}
.card:hover { box-shadow: var(--shadow-md); }
.card-body { padding: 20px; }
.card-sm { padding: 14px 18px; }

/* STAT CARDS */
.stat-card {
  background: var(--card); border: 1px solid var(--border-light); 
  border-radius: var(--radius); padding: 18px 20px; transition: all var(--transition);
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.stat-icon {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 1.1rem; margin-bottom: 8px;
}
.stat-value { font-size: 1.5rem; font-weight: 800; line-height: 1.2; letter-spacing: -.5px; }
.stat-label { font-size: .78rem; color: var(--text2); font-weight: 500; margin-top: 2px; }
.stat-change { font-size: .72rem; margin-top: 4px; }

/* TABLE */
.table-wrap { 
  background: var(--card); border: 1px solid var(--border-light); 
  border-radius: var(--radius); overflow: hidden; 
}
.table { width: 100%; border-collapse: collapse; font-size: .84rem; color: var(--text); margin: 0; }
.table th {
  background: var(--table-head); color: var(--text2); font-weight: 600; font-size: .73rem;
  text-transform: uppercase; letter-spacing: .4px; padding: 10px 14px; border-bottom: 1px solid var(--border);
  text-align: left; white-space: nowrap;
}
.table td { padding: 10px 14px; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
.table tr:last-child td { border-bottom: none; }
.table tbody tr { transition: background .12s; }
.table tbody tr:hover { background: var(--accent-light); }

/* FORMS */
.form-control, .form-select {
  background: var(--input-bg); color: var(--text); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px 12px; font-size: .84rem;
  transition: all var(--transition); font-family: inherit; width: 100%;
}
.form-control:focus, .form-select:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); outline: none;
}
textarea.form-control { resize: vertical; }
.form-label { font-size: .8rem; font-weight: 600; color: var(--text2); margin-bottom: 4px; display: block; }
.search-input {
  border-radius: var(--radius-sm); border: 1px solid var(--border); 
  padding: 7px 14px; font-size: .82rem; width: 200px; 
  background: var(--input-bg); color: var(--text); transition: all var(--transition);
}
.search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }

/* STATUS BADGES */
.badge-status {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 12px; border-radius: 20px; font-weight: 600; font-size: .73rem; line-height: 1.4;
}
.badge-active { background: rgba(212,120,60,.12); color: var(--accent); }
.badge-done { background: rgba(108,117,125,.12); color: #6c757d; }
.badge-delivered { background: rgba(25,135,84,.12); color: #198754; }
.badge-dot { width: 7px; height: 7px; border-radius: 50%; }
.badge-dot.active { background: var(--accent); }
.badge-dot.done { background: #6c757d; }
.badge-dot.delivered { background: #198754; }

/* MODALS */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 1050;
  display: flex; align-items: center; justify-content: center; 
  opacity: 0; visibility: hidden; transition: all .25s ease;
  backdrop-filter: blur(1px);
}
.modal-overlay.show { opacity: 1; visibility: visible; }
.modal-dialog {
  background: var(--card); border-radius: var(--radius); 
  box-shadow: var(--shadow-lg); width: 90%; max-width: 600px; max-height: 85vh;
  overflow-y: auto; transform: translateY(20px); transition: transform .25s ease;
}
.modal-overlay.show .modal-dialog { transform: translateY(0); }
.modal-dialog.modal-lg { max-width: 800px; }
.modal-dialog.modal-xl { max-width: 1000px; }
.modal-dialog.modal-sm { max-width: 400px; }
.modal-header {
  padding: 16px 22px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  background: var(--accent); color: #fff;
  border-radius: var(--radius) var(--radius) 0 0;
}
.modal-header h5 { font-weight: 700; font-size: 1rem; margin: 0; }
.modal-close { background: none; border: none; color: #fff; font-size: 1.2rem; cursor: pointer; opacity: .8; padding: 4px 8px; border-radius: 6px; }
.modal-close:hover { opacity: 1; background: rgba(255,255,255,.15); }
.modal-body { padding: 20px 22px; }
.modal-footer { 
  padding: 14px 22px; border-top: 1px solid var(--border); 
  display: flex; justify-content: flex-end; gap: 8px; 
}

/* CLIENT / ORDER CARDS */
.item-card {
  background: var(--card); border: 1px solid var(--border-light); 
  border-radius: var(--radius); padding: 16px; cursor: pointer;
  transition: all var(--transition); height: 100%;
}
.item-card:hover { border-color: var(--accent); box-shadow: var(--shadow-md); }
.item-card .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.item-card .item-title { font-weight: 700; font-size: .95rem; }
.item-card .item-meta { font-size: .78rem; color: var(--text2); }
.item-card .item-price { font-weight: 700; color: var(--accent); font-size: 1.05rem; }
.item-card .item-footer { 
  display: flex; gap: 6px; margin-top: 12px; padding-top: 10px; 
  border-top: 1px solid var(--border-light); flex-wrap: wrap;
}

/* KANBAN */
.kanban-board { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.kanban-col { 
  background: var(--card); border: 1px solid var(--border-light);
  border-radius: var(--radius); padding: 14px; min-height: 300px;
  transition: all var(--transition);
}
.kanban-col.drag-over { outline: 2px dashed var(--accent); outline-offset: -4px; }
.kanban-col .kanban-header { 
  font-weight: 700; font-size: .9rem; margin-bottom: 12px; padding-bottom: 10px;
  border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center;
}
.kanban-card {
  background: var(--card); border: 1px solid var(--border-light); 
  border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px;
  cursor: grab; font-size: .82rem; transition: all var(--transition);
}
.kanban-card:hover { border-color: var(--accent); box-shadow: var(--shadow); }
.kanban-card.dragging { opacity: .4; }
.kanban-card .kc-id { font-weight: 700; color: var(--accent); }
.kanban-card .kc-name { font-weight: 600; }

/* CALENDAR */
.calendar-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-day {
  padding: 8px 6px; text-align: center; border-radius: 6px; font-size: .8rem;
  font-weight: 500; min-height: 36px; display: flex; flex-direction: column; 
  align-items: center; justify-content: center; cursor: default;
}
.cal-day.weekday { font-weight: 700; color: var(--text2); font-size: .7rem; text-transform: uppercase; }
.cal-day.present { background: #d4edda; color: #155724; }
.cal-day.absent { background: #f8d7da; color: #721c24; }
.cal-day.future { background: var(--table-head); color: var(--text3); }
.cal-day.today { border: 2px solid var(--accent); }
body.dark .cal-day.present { background: #1a3a2a; color: #7ddf90; }
body.dark .cal-day.absent { background: #3a1a1a; color: #df7d7d; }

/* TOAST */
.toast-container { 
  position: fixed; top: 16px; right: 16px; z-index: 9999;
  display: flex; flex-direction: column; gap: 8px; 
}
.toast {
  padding: 10px 18px; border-radius: var(--radius-sm); color: #fff; font-size: .84rem;
  font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,.2); 
  animation: slideIn .3s ease; cursor: pointer; max-width: 380px;
  word-wrap: break-word;
}
.toast-success { background: #059669; }
.toast-error { background: #dc2626; }
.toast-warning { background: #d97706; }
.toast-info { background: #2563eb; }

/* LOADING */
.loading-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.12); z-index: 9998;
  display: flex; align-items: center; justify-content: center; backdrop-filter: blur(1px);
}
.loading-box {
  background: var(--card); padding: 14px 24px; border-radius: var(--radius); 
  box-shadow: var(--shadow-lg); font-size: .84rem; font-weight: 500; 
  color: var(--text); display: flex; align-items: center; gap: 10px;
}

/* MISC */
.hamburger { 
  position: fixed; top: 12px; left: 12px; z-index: 9991; padding: 6px 10px; 
  font-size: 1.2rem; background: var(--card); border: 1px solid var(--border); 
  border-radius: var(--radius-sm); cursor: pointer; color: var(--text);
  display: none;
}
.draft-indicator { 
  font-size: .7rem; color: var(--accent); font-weight: 600; margin-left: 8px; 
}
.empty-state { text-align: center; padding: 40px 20px; color: var(--text3); }
.empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 10px; opacity: .5; }
.search-box-wrap { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.order-item-row { 
  display: grid; grid-template-columns: 5fr 2fr 1.5fr 2fr 30px; gap: 8px; 
  align-items: center; margin-bottom: 6px;
}
.grip { cursor: grab; color: var(--text3); font-size: .8rem; user-select: none; }
.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
.settings-block { 
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  background: var(--card); border: 1px solid var(--border-light); border-radius: var(--radius-sm); 
}
.chart-container { 
  background: var(--card); border: 1px solid var(--border-light); 
  border-radius: var(--radius); padding: 16px; 
}
.chart-container canvas { max-height: 200px; }

@media(max-width:768px) {
  .sidebar { 
    position: fixed; z-index: 9990; width: 280px; 
    transform: translateX(-100%); 
  }
  .sidebar.open { transform: translateX(0); }
  .content { padding: 16px; }
  .hamburger { display: flex !important; }
  .kanban-board { grid-template-columns: 1fr; }
  .order-item-row { grid-template-columns: 1fr; }
  .search-input { width: 140px; }
}

@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes spinner { to { transform: rotate(360deg); } }
.spinner { 
  display: inline-block; width: 16px; height: 16px; 
  border: 2px solid var(--border); border-top-color: var(--accent); 
  border-radius: 50%; animation: spinner .6s linear infinite; 
}
</style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <h4>3D Сервис</h4>
    <span>CRM система</span>
  </div>
  <ul class="sidebar-nav nav flex-column" id="mainNav"></ul>
  <div class="sidebar-footer">
    <div class="d-flex align-items-center gap-2 mb-2">
      <span class="text-white-50 small" id="sidebarUserName"></span>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-outline" onclick="openProfile()">👤 Профиль</button>
      <button class="btn btn-sm btn-outline" onclick="toggleTheme()" id="themeBtn">🌓</button>
      <a class="btn btn-sm btn-primary" id="backupBtn" style="display:none" href="/api/export/database">💾</a>
      <button class="btn btn-sm btn-outline" onclick="logout()">🚪</button>
    </div>
  </div>
</nav>

<button class="hamburger" onclick="toggleSidebar()">☰</button>

<!-- Content -->
<main class="content" id="tabContent"></main>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<!-- Templates for modals -->
<div id="modalContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
// ==================== CORE ====================
const API = '/api';
const token = localStorage.getItem('token');
if (!token) window.location.href = '/login';

const origFetch = window.fetch;
window.fetch = function(u, o) {
  o = o || {}; o.headers = o.headers || {};
  o.headers['Authorization'] = 'Bearer ' + token;
  return origFetch(u, o).then(r => {
    if (r.status === 401) { localStorage.clear(); window.location.href = '/login'; }
    return r;
  });
};

let currentUser = null;
let permissions = {};
let _loaded = {};
let _loadingCount = 0;

function showLoading() {
  if (++_loadingCount === 1) {
    let el = document.getElementById('loadingOverlay');
    if (!el) {
      el = document.createElement('div'); el.id = 'loadingOverlay'; el.className = 'loading-overlay';
      el.innerHTML = '<div class="loading-box"><span class="spinner"></span> Загрузка...</div>';
      document.body.appendChild(el);
    }
    el.style.display = 'flex';
  }
}
function hideLoading() {
  _loadingCount = Math.max(0, _loadingCount - 1);
  if (!_loadingCount) {
    let el = document.getElementById('loadingOverlay');
    if (el) el.style.display = 'none';
  }
}

function showToast(msg, type = 'success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  t.onclick = () => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); };
  c.appendChild(t);
  setTimeout(() => { if (t.parentNode) { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); } }, 4000);
}

let _confirmCb = null;
function confirmAction(msg, cb, btnText = 'Удалить') {
  _confirmCb = cb;
  document.getElementById('confirmTitle').textContent = 'Подтверждение';
  document.getElementById('confirmBody').textContent = msg;
  document.getElementById('confirmOkBtn').textContent = btnText;
  showModal('confirmModal');
}
function confirmOk() {
  const cb = _confirmCb; _confirmCb = null; hideModal('confirmModal'); if (cb) cb();
}

function html(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let _debounceTimers = {};
function debounce(fn, ms = 300) {
  const key = fn.name || Math.random();
  return function(...args) {
    clearTimeout(_debounceTimers[key]);
    _debounceTimers[key] = setTimeout(() => fn.apply(this, args), ms);
  };
}

// ==================== THEME ====================
function toggleTheme() {
  const themes = ['auto','dark','light'];
  let cur = localStorage.getItem('theme') || 'auto';
  cur = themes[(themes.indexOf(cur) + 1) % 3];
  localStorage.setItem('theme', cur);
  applyTheme();
}
function applyTheme() {
  const saved = localStorage.getItem('theme') || 'auto';
  const hour = new Date().getHours();
  const shouldDark = saved === 'dark' || (saved === 'auto' && (hour >= 20 || hour < 7));
  document.body.classList.toggle('dark', shouldDark);
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = saved === 'auto' ? '🌓' : saved === 'dark' ? '🌙' : '☀️';
}
if (!localStorage.getItem('theme')) localStorage.setItem('theme','auto');
applyTheme(); setInterval(applyTheme, 60000);

// ==================== SIDEBAR & NAV ====================
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function switchTab(tabId) {
  document.querySelectorAll('.tab-page').forEach(p => p.style.display = 'none');
  const el = document.getElementById(tabId);
  if (el) el.style.display = 'block';
  
  document.querySelectorAll('.nav-link[data-tab]').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.sub-link[data-tab]').forEach(l => l.classList.remove('active'));
  document.querySelectorAll(`[data-tab="${tabId}"]`).forEach(l => l.classList.add('active'));
  
  if (window.innerWidth <= 768) toggleSidebar();
  
  if (!_loaded[tabId]) {
    const handlers = {
      'tab-dashboard': loadDashboard,
      'tab-clients': loadClients,
      'tab-repair': () => loadOrdersByType('repair'),
      'tab-print': () => loadOrdersByType('print'),
      'tab-archive': loadArchiveOrders,
      'tab-kanban': loadKanban,
      'tab-leads': loadLeads,
      'tab-services': loadServices,

let _activeModals = [];

function showModal(id) {
  let m = document.getElementById(id);
  if (!m) return;
  m.classList.add('show');
  _activeModals.push(id);
  document.body.style.overflow = 'hidden';
}
function hideModal(id) {
  let m = document.getElementById(id);
  if (!m) return;
  m.classList.remove('show');
  _activeModals = _activeModals.filter(x => x !== id);
  if (!_activeModals.length) document.body.style.overflow = '';
}
function hideAllModals() {
  document.querySelectorAll('.modal-overlay.show').forEach(m => m.classList.remove('show'));
  _activeModals = [];
  document.body.style.overflow = '';
}

async function initApp() {
  try {
    const r = await fetch(`${API}/auth/me`);
    currentUser = await r.json();
    if (!currentUser || !currentUser.id) throw new Error('No user');
    
    if (currentUser.role_name === 'admin') {
      permissions = { is_admin: true, can_view_warehouse: true, can_view_reports: true, can_assign_tasks: true, can_view_clients: true, can_edit_orders: true, can_delete_orders: true };
    } else {
      const roles = await (await fetch(`${API}/auth/roles`)).json();
      const role = roles.find(x => x.id === currentUser.role_id);
      permissions = { 
        is_admin: false,
        can_view_warehouse: !!role?.can_view_warehouse, 
        can_view_reports: !!role?.can_view_reports,
        can_assign_tasks: !!role?.can_assign_tasks,
        can_view_clients: role?.can_view_clients !== false,
        can_edit_orders: !!role?.can_edit_orders,
        can_delete_orders: !!role?.can_delete_orders
      };
      if (role?.can_assign_tasks) document.getElementById('newAssignmentBtn') && (document.getElementById('newAssignmentBtn').style.display = '');
    }
    
    renderSidebar();
    renderModals();
    renderTabContent();
    switchTab('tab-dashboard');
    
    if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
    setInterval(checkNotifications, 60000);
    setTimeout(checkNotifications, 5000);
    connectSSE();
    setInterval(() => { if (document.getElementById('tab-dashboard').style.display !== 'none') { _loaded['tab-dashboard'] = false; loadDashboard(); } }, 45000);
    
    document.addEventListener('keydown', e => {
      if (e.ctrlKey || e.metaKey) {
        const page = document.querySelector('.tab-page:not([style*="display: none"])');
        if (!page) return;
        if (e.key === 'n' || e.key === 'N') { e.preventDefault(); showNewForTab(page.id); }
        if (e.key === 'f' || e.key === 'F') { e.preventDefault(); const inp = document.querySelector('.search-input,[id$=Search]'); if (inp) inp.focus(); }
      }
    });
  } catch(e) { window.location.href = '/login'; }
}

function showNewForTab(tabId) {
  if (tabId === 'tab-repair' || tabId === 'tab-print' || tabId === 'tab-kanban') showOrderModal();
  else if (tabId === 'tab-clients') showClientModal(null);
  else if (tabId === 'tab-services') showServiceModal(null);
  else if (tabId === 'tab-warehouse-repair') showProductModal('repair_part', null);
  else if (tabId === 'tab-warehouse-sale') showProductModal('sale', null);
  else if (tabId === 'tab-tasks') showTaskModal(null);
}

initApp();

      chartOrdersInstance = new Chart(co, {
        type: 'bar',
        data: {
          labels: d.chart_orders.map(x => x.date.slice(5)),

        },
        options: { responsive: true, maintainAspectRatio: true, aspectRatio: 2, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
      });
    }

      chartIncomeInstance = new Chart(ci, {
        type: 'line',

async function loadClients() {
  allClients = await (await fetch(`${API}/clients`)).json();
  filterClients();
  const sel = document.getElementById('orderClientSelect');
  if (sel) { const v = sel.value; sel.innerHTML = '<option value="new">➕ Новый клиент</option>'; allClients.forEach(x => sel.innerHTML += `<option value="${x.id}">${html(x.full_name)} (${html(x.phone)})</option>`); if (v) sel.value = v; }

function filterClients() {
  const q = (document.getElementById('clientSearch')?.value || '').toLowerCase();
  const df = document.getElementById('clientDateFrom')?.value || '';
  const dt = document.getElementById('clientDateTo')?.value || '';
  document.getElementById('clientsBody').innerHTML = allClients.filter(x => {
    let m = !q || x.full_name.toLowerCase().includes(q) || x.phone.includes(q);
    if (m && df) m = new Date(x.created_at) >= new Date(df);
    if (m && dt) m = new Date(x.created_at) <= new Date(dt + 'T23:59:59');
    return m;
  }).map(x => `
    <div class="col-md-4 col-lg-3"><div class="item-card" onclick="editClient(${x.id})">
      <div class="item-header"><div class="item-title">${html(x.full_name)}</div><span class="text-muted small">${new Date(x.created_at).toLocaleDateString()}</span></div>
      <div class="item-meta">📞 ${html(x.phone)}</div>
      <div class="item-footer">
        <button class="btn btn-outline btn-xs" onclick="event.stopPropagation();editClient(${x.id})">✎</button>
        <button class="btn btn-danger btn-xs" onclick="event.stopPropagation();deleteClient(${x.id})">✕</button>
      </div>
    </div></div>
  `).join('') || '<div class="col-12 empty-state"><div class="empty-icon">👥</div>Клиенты не найдены</div>';
}

function oi(idx) {

function recalcOrderTotal() {
  let t = 0;
  document.querySelectorAll('.order-item').forEach(d => {
    const qty = parseInt(d.querySelectorAll('input[type="number"]')[0]?.value) || 0;
    const prc = parseFloat(d.querySelector('.price-input')?.value) || 0;
    t += qty * prc;
  });
  ['orderTotal','editOrderTotal'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = t.toFixed(2); });
}

async function saveOrder(e) {
  e.preventDefault();
  const cs = document.getElementById('orderClientSelect'); const cid = cs.value === 'new' ? '' : cs.value;
  const cname = cid ? '' : (document.getElementById('orderClientName').value || '');
  if (!cid && !cname) { showToast('Выберите клиента или введите имя', 'warning'); return; }
  
  const items = []; let ok = true;
  document.querySelectorAll('#orderItems .order-item').forEach(div => {
    const sel = div.querySelector('select'); const cn = div.querySelectorAll('input')[0];
    const customName = cn?.value?.trim() || ''; const sid = sel.value ? parseInt(sel.value) : 0;
    if (!sid && !customName) { ok = false; return; }
    const qty = parseInt(div.querySelectorAll('input[type="number"]')[0]?.value) || 1;
    const prc = parseFloat(div.querySelector('.price-input')?.value) || 0;
    items.push(!sid && customName ? { service_id: 0, custom_name: customName, quantity: qty, price: prc } : { service_id: sid, custom_name: customName || null, quantity: qty, price: prc });
  });

  showLoading();
  try {
    const assignee = document.getElementById('orderAssignee') ? parseInt(document.getElementById('orderAssignee').value) || null : null;
    await fetch(`${API}/orders`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ client_id: cid ? parseInt(cid) : 0, client_name: cname, order_type: document.getElementById('orderType').value, printer: document.getElementById('orderPrinter').value, description: document.getElementById('orderDescription').value, modeler: document.getElementById('orderModeler').value, complaint: document.getElementById('orderComplaint').value, address: document.getElementById('orderAddress').value, pickup_time: document.getElementById('orderPickupTime').value, note: document.getElementById('orderNote').value, items: items, materials: getMaterialsJSON(), assigned_to: assignee })

    ['tab-repair','tab-print','tab-kanban','tab-dashboard'].forEach(t => _loaded[t] = false);

}

async function loadOrdersByType(type) {
  showLoading();
  try {
    const active = await (await fetch(`${API}/orders?status=active`)).json();
    const done = await (await fetch(`${API}/orders?status=done`)).json();
    const all = [...active, ...done].filter(x => x.order_type === type);
    const bodyId = type === 'repair' ? 'repairOrdersBody' : 'printOrdersBody';
    
    if (_orderViewMode[type] === 'table') {
      document.getElementById(bodyId).innerHTML = `<div class="table-wrap"><table class="table"><thead><tr><th></th><th>#</th><th>Клиент</th><th>Статус</th><th>Сумма</th><th>Дата</th><th></th></tr></thead><tbody>${all.map(x => `<tr><td><input type="checkbox" class="form-check-input" onclick="toggleBulk(${x.id},'${type}')"></td><td>#${x.id}</td><td>${html(x.client_name)}</td><td>${statusBadge(x.status)}</td><td>${x.total_price.toFixed(2)} ₽</td><td>${new Date(x.created_at).toLocaleDateString()}</td><td><button class="btn btn-outline btn-xs" onclick="editOrder(${x.id})">✎</button> <button class="btn btn-danger btn-xs" onclick="deleteOrder(${x.id})">✕</button></td></tr>`).join('')}</tbody></table></div>`;
    } else {
      document.getElementById(bodyId).innerHTML = all.map(x => orderCard(x, `<button class="btn btn-danger btn-xs" onclick="event.stopPropagation();deleteOrder(${x.id})">✕</button>`, type)).join('') || '<div class="col-12 empty-state"><div class="empty-icon">📋</div>Нет активных заказов</div>';
    }
    
    const badge = document.getElementById('orderBadge');
    const total = [...active, ...done];
    if (badge) { badge.style.display = total.length ? '' : 'none'; badge.textContent = total.length; }
  } finally { hideLoading(); }
}

async function loadKanban() {
  const r = await (await fetch(`${API}/orders`)).json();
  const cols = {
    active: { title: '🔄 В работе', orders: r.filter(x => x.status === 'active') },
    done: { title: '✅ Сделано', orders: r.filter(x => x.status === 'done') },
    delivered: { title: '📦 Выдано', orders: r.filter(x => x.status === 'delivered') }
  };
  let html = '';
  Object.entries(cols).forEach(([key, col]) => {
    html += `<div class="kanban-col" data-status="${key}" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropOrder(event,'${key}')">
      <div class="kanban-header">${col.title} <span style="font-size:.7rem;color:var(--text3)">${col.orders.length}</span></div>
      ${col.orders.map(o => `<div class="kanban-card" draggable="true" ondragstart="dragStart(event,${o.id},'${key}')" onclick="editOrder(${o.id})"><div><span class="kc-id">#${o.id}</span> <span class="kc-name">${html(o.client_name)}</span></div><div class="small text-muted">${o.total_price.toFixed(2)} ₽ | ${o.printer||'—'}</div></div>`).join('')}
    </div></div>`;
  });
  document.getElementById('kanbanBoard').innerHTML = html;
}

let dragOrderId = null, dragFrom = null;
function dragStart(e, id, from) { dragOrderId = id; dragFrom = from; e.dataTransfer.effectAllowed = 'move'; }
function dragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function dropOrder(e, to) {
  e.currentTarget.classList.remove('drag-over');
  if (!dragOrderId || dragFrom === to) return;
  fetch(`${API}/orders/${dragOrderId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: to }) }).then(() => { dragOrderId = null; dragFrom = null; loadKanban(); });
}

function calcTotal() {
  let t = 0;
  document.querySelectorAll('#calcRows .row').forEach(row => {
    const sel = row.querySelector('select');
    const qty = parseInt(row.querySelector('input[type="number"]')?.value) || 0;
    const opt = sel?.options[sel.selectedIndex];
    const p = opt ? parseFloat(opt.dataset.price) || 0 : 0;
    const s = qty * p; t += s;
    const priceEl = row.querySelector('strong');
    if (priceEl) priceEl.textContent = s.toFixed(2) + ' ₽';
  });
  document.getElementById('calcTotal').textContent = t.toFixed(2);
}

async function renderCalendar() {
  const r = await (await fetch(`${API}/attendance`)).json();
  const dates = {}; r.forEach(x => dates[x.date] = x);
  const today = new Date(); const y = today.getFullYear(); const m = today.getMonth();
  const first = new Date(y,m,1); const last = new Date(y,m+1,0);
  const days = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  let h = days.map(d => `<div class="cal-day weekday">${d}</div>`).join('');
  const pad = first.getDay() === 0 ? 6 : first.getDay() - 1;
  for (let i = 0; i < pad; i++) h += '<div></div>';
  for (let d = 1; d <= last.getDate(); d++) {
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec = dates[ds];
    const tc = ds === today.toISOString().slice(0,10) ? ' today' : '';
    let cls = rec ? (rec.check_in ? 'present' : 'absent') : (new Date(ds) < new Date(today.toISOString().slice(0,10)) ? 'absent' : 'future');
    h += `<div class="cal-day ${cls}${tc}">${d}</div>`;
  }
  document.getElementById('attendanceCalendar').innerHTML = h;
}

async function loadAllSchedule() {

  const today = new Date(); const y = today.getFullYear(); const m = today.getMonth();
  const first = new Date(y,m,1); const last = new Date(y,m+1,0);
  const days = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  let h = days.map(d => `<div class="cal-day weekday">${d}</div>`).join('');

    const list = map[ds] || [];

  }
  document.getElementById('allScheduleCalendar').innerHTML = h;
}
function renderScheduleCalendar(records) {
  const map = {}; records.forEach(r => { map[r.date] = r; });
  const today = new Date(); const y = today.getFullYear(); const m = today.getMonth();
  const first = new Date(y,m,1); const last = new Date(y,m+1,0);
  const days = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  let h = days.map(d => `<div class="cal-day weekday">${d}</div>`).join('');
  const pad = first.getDay() === 0 ? 6 : first.getDay() - 1;
  for (let i = 0; i < pad; i++) h += '<div></div>';
  for (let d = 1; d <= last.getDate(); d++) {
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec = map[ds];
    const tc = ds === today.toISOString().slice(0,10) ? ' today' : '';
    let cls = 'future'; if (rec) cls = 'present';
    h += `<div class="cal-day ${cls}${tc}" onclick="scheduleClickDay('${ds}')" style="cursor:pointer">${d}${rec?`<br><small>${rec.time_from}-${rec.time_to}</small>`:''}</div>`;
  }
  document.getElementById('scheduleCalendar').innerHTML = h;
}
function scheduleClickDay(ds) {
  document.getElementById('scheduleDate').value = ds;
  document.getElementById('scheduleModalDate').textContent = ds;
  document.getElementById('scheduleFrom').value = '09:00';

async function loadProducts(cat) {
  try {
    if (cat) allProducts[cat] = await (await fetch(`${API}/warehouse/products?category=${cat}`)).json();
    else {
      allProducts['repair_part'] = await (await fetch(`${API}/warehouse/products?category=repair_part`)).json();
      allProducts['sale'] = await (await fetch(`${API}/warehouse/products?category=sale`)).json();
    }
    filterProducts(cat);
  } catch(e) {}
}
function loadWarehouse() { loadProducts('repair_part'); }
function loadWarehouseSale() { loadProducts('sale'); }

function filterProducts(cat) {
  const suffix = cat || 'sale';
  const q = (document.getElementById('productSearch' + (suffix==='repair_part'?'Repair':'Sale'))?.value || '').toLowerCase();
  const limit = parseInt(document.getElementById('stockLimit' + (suffix==='repair_part'?'Repair':'Sale'))?.value || 3) || 3;
  const sort = document.getElementById('productSort' + (suffix==='repair_part'?'Repair':'Sale'))?.value || 'name';
  let arr = (allProducts[suffix] || []).filter(x => !q || x.name.toLowerCase().includes(q) || (x.article||'').toLowerCase().includes(q));
  arr.sort((a,b) => {
    if (sort.startsWith('name')) { const r = a.name.toLowerCase() < b.name.toLowerCase() ? -1 : 1; return sort.endsWith('_desc') ? -r : r; }
    const r = a.quantity - b.quantity; return sort.endsWith('_desc') ? -r : r;
  });
  let totalItems = 0, lowItems = 0;
  arr.forEach(x => { totalItems += x.quantity; if (x.quantity <= (x.min_stock || limit)) lowItems++; });
  const statsId = 'warehouseStats' + (suffix==='repair_part'?'Repair':'Sale');
  document.getElementById(statsId).innerHTML = `
    <div class="col-md-3"><div class="stat-card"><div class="stat-icon" style="background:#fef3c7;color:#d97706">📦</div><div class="stat-value">${arr.length}</div><div class="stat-label">Позиций</div></div></div>
    <div class="col-md-3"><div class="stat-card"><div class="stat-icon" style="background:#d1fae5;color:#059669">📊</div><div class="stat-value">${totalItems}</div><div class="stat-label">Всего единиц</div></div></div>
    <div class="col-md-3"><div class="stat-card"><div class="stat-icon" style="background:${lowItems?'#fef2f2':'#f0f0f0'};color:${lowItems?'#dc2626':'#999'}">⚠️</div><div class="stat-value" style="color:${lowItems?'#dc2626':'#999'}">${lowItems}</div><div class="stat-label">Мало</div></div></div>
  `;
  const bodyId = 'productsBody' + (suffix==='repair_part'?'Repair':'Sale');
  document.getElementById(bodyId).innerHTML = arr.map(x => {
    const low = x.quantity <= (x.min_stock || limit);
    return `<div class="col-md-6 col-lg-4"><div class="item-card" onclick="editProduct(${x.id})" style="${low?'border-color:#dc2626':''}">
      <div class="item-header"><div class="item-title">${low?'⚠️ ':''}${html(x.name)}</div><span class="text-muted small">${x.article||'—'}</span></div>
      <div class="item-meta">🎨 ${x.color||'—'} | 📦 <strong style="color:${low?'#dc2626':'var(--accent)'}">${x.quantity}</strong> шт${x.min_stock?` (мин: ${x.min_stock})`:''}</div>
      <div class="item-footer">
        <button class="btn btn-outline btn-xs" onclick="event.stopPropagation();showStockModal(${x.id})">📋</button>
        <button class="btn btn-outline btn-xs" onclick="event.stopPropagation();editProduct(${x.id})">✎</button>
        <button class="btn btn-danger btn-xs" onclick="event.stopPropagation();deleteProduct(${x.id})">✕</button>
      </div>
    </div></div>`;
  }).join('') || '<div class="col-12 empty-state"><div class="empty-icon">📦</div>Товары не найдены</div>';
}

function showProductModal(cat, d) {
  document.getElementById('productId').value = d?.id || '';
  document.getElementById('productName').value = d?.name || '';
  document.getElementById('productColor').value = d?.color || '';
  document.getElementById('productArticle').value = d?.article || '';
  document.getElementById('productQuantity').value = d?.quantity || 0;
  document.getElementById('productMinStock').value = d?.min_stock || 0;
  document.getElementById('productCategorySelect').value = d?.category || cat || 'sale';
  document.getElementById('productImageInput').value = '';
  document.getElementById('productImagePreview').innerHTML = d?.image ? `<img src="${d.image}" style="max-width:120px;max-height:120px;border-radius:8px">` : '<span class="text-muted small">фото не выбрано</span>';
  document.getElementById('productModalTitle').textContent = d ? 'Редактировать товар' : 'Новый товар';
  if (d?.id) {
    fetch(`${API}/warehouse/movements?product_id=${d.id}`).then(r => r.json()).then(m => {
      document.getElementById('productMovements').innerHTML = m.length ? '<h6 class="fw600 mt-3 mb-2">📋 Последние движения</h6>' + m.slice(0,5).map(x => {
        const t = x.type === 'supply' ? '🟢' : '🔴';
        return `<div style="padding:4px 0;border-bottom:1px solid var(--border-light);font-size:.82rem">${t} ${x.quantity>0?'+'+x.quantity:x.quantity} шт — ${html(x.reason)} <span class="text-muted">${html(x.user_name)}</span> <span class="text-muted" style="font-size:.7rem">${new Date(x.created_at).toLocaleString()}</span></div>`;
      }) : '<div class="text-muted small mt-2">Нет движений</div>';
    });
  }
  showModal('productModal');
}
function editProduct(id) { fetch(`${API}/warehouse/products/${id}`).then(r => r.json()).then(d => showProductModal(d.category, d)); }
async function saveProduct(e) {
  e.preventDefault();
  const id = document.getElementById('productId').value;
  const b = { name: document.getElementById('productName').value, color: document.getElementById('productColor').value, article: document.getElementById('productArticle').value, quantity: parseInt(document.getElementById('productQuantity').value) || 0, min_stock: parseInt(document.getElementById('productMinStock').value) || 0, category: document.getElementById('productCategorySelect').value };
  const p = await fetch(id ? `${API}/warehouse/products/${id}` : `${API}/warehouse/products`, { method: id ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(b) });
  const prod = await p.json();
  const inp = document.getElementById('productImageInput');
  if (inp.files?.[0]) { const fd = new FormData(); fd.append('file', inp.files[0]); await fetch(`${API}/warehouse/products/${prod.id}/upload`, { method: 'POST', body: fd }); }
  hideModal('productModal'); loadProducts();
}
async function deleteProduct(id) { confirmAction('Удалить товар?', async () => { await fetch(`${API}/warehouse/products/${id}`, { method: 'DELETE' }); loadProducts(); }); }

async function showStockModal(pid) {
  const r = await (await fetch(`${API}/warehouse/products`)).json();
  const sel = document.getElementById('stockProduct');
  sel.innerHTML = '<option value="">— выберите —</option>';
  r.forEach(x => sel.innerHTML += `<option value="${x.id}" ${pid&&x.id===pid?'selected':''}>${x.name} (${x.quantity} шт)</option>`);
  document.getElementById('stockQuantity').value = 1;
  document.getElementById('stockComment').value = '';
  showModal('stockModal');
}
async function saveStockMovement() {
  const pid = document.getElementById('stockProduct').value;
  if (!pid) { showToast('Выберите товар', 'warning'); return; }
  const qty = parseInt(document.getElementById('stockQuantity').value) || 0;
  if (qty < 1) { showToast('Укажите количество', 'warning'); return; }
  await fetch(`${API}/warehouse/movements`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ product_id: parseInt(pid), type: document.getElementById('stockType').value, reason: document.getElementById('stockReason').value, quantity: qty, comment: document.getElementById('stockComment').value }) });
  hideModal('stockModal'); loadProducts(); showToast('Движение проведено');
}
async function showStockMovements() {
  const r = await (await fetch(`${API}/warehouse/movements`)).json();
  document.getElementById('stockMovementsBody').innerHTML = r.map(x => {
    const t = x.type === 'supply' ? '<span style="color:#059669">➕ Пополнение</span>' : '<span style="color:#dc2626">➖ Списание</span>';
    return `<tr><td style="white-space:nowrap">${new Date(x.created_at).toLocaleString()}</td><td>${x.product_name}</td><td>${t}</td><td>${x.reason}</td><td>${x.quantity>0?'+'+x.quantity:x.quantity}</td><td>${x.stock_before}</td><td>${x.stock_after}</td><td>${x.user_name}</td><td>${x.comment||''}</td></tr>`;
  }).join('');
  showModal('stockMovementsModal');
}

// ==================== ASSIGNMENTS ====================
async function loadAssignments() {
  const r = await (await fetch(`${API}/task-assignments/my`)).json();
  document.getElementById('assignmentsBody').innerHTML = r.map(x => {
    const st = x.status === 'new' ? '<span class="badge-status badge-active">Новое</span>' : x.status === 'in_progress' ? '<span class="badge-status badge-done">В работе</span>' : '<span class="badge-status badge-delivered">✅ Готово</span>';
    let btns = '';
    if (x.status !== 'done') btns = `<button class="btn btn-outline btn-xs me-1" onclick="updateAssignment(${x.id},'in_progress')">В работу</button><button class="btn btn-success btn-xs" onclick="updateAssignment(${x.id},'done')">✅ Готово</button>`;
    return `<div class="col-md-4"><div class="item-card">
      <div class="d-flex justify-content-between"><strong>${html(x.title)}</strong> ${st}</div>
      ${x.description ? `<div class="small text-muted mt-1">${html(x.description)}</div>` : ''}
      <div class="small text-muted mt-1">От: ${x.assigned_by_name}</div>
      <div class="mt-2">${btns}</div>
    </div></div>`;
  }).join('') || '<div class="col-12 empty-state"><div class="empty-icon">📋</div>Нет заданий</div>';
}
async function showAssignmentModal() {
  const u = await (await fetch(`${API}/auth/users`)).json();
  const sel = document.getElementById('assignmentUser');
  sel.innerHTML = '<option value="">— выберите —</option>';
  u.forEach(x => sel.innerHTML += `<option value="${x.id}">${x.full_name||x.username} (${x.role_name})</option>`);
  document.getElementById('assignmentTitle').value = '';
  document.getElementById('assignmentDesc').value = '';
  showModal('assignmentModal');
}
async function saveAssignment() {
  const title = document.getElementById('assignmentTitle').value.trim();
  const uid = document.getElementById('assignmentUser').value;
  if (!title || !uid) { showToast('Заполните заголовок и выберите сотрудника', 'warning'); return; }
  await fetch(`${API}/task-assignments`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title, description: document.getElementById('assignmentDesc').value, assigned_to: parseInt(uid) }) });
  hideModal('assignmentModal'); loadAssignments();
}
async function updateAssignment(id, status) { await fetch(`${API}/task-assignments/${id}?status=${status}`, { method: 'PUT' }); loadAssignments(); }

// ==================== NOTIFICATIONS / SSE ====================
async function checkNotifications() {
  if (!('Notification' in window) || Notification.permission === 'denied') return;
  try {
    const d = await (await fetch(`${API}/dashboard`)).json();
    const p1 = await (await fetch(`${API}/warehouse/products?category=repair_part`)).json();
    const p2 = await (await fetch(`${API}/warehouse/products?category=sale`)).json();
    const allP = [...p1, ...p2];
    const low = allP.filter(x => x.quantity <= (x.min_stock || 3));
    let msg = '';
    if (low.length) msg += '⚠️ Мало на складе: ' + low.map(x => x.name + ' (' + x.quantity + ' шт)').join(', ');
    if (d.new_leads > 0) { if (msg) msg += '\n'; msg += '📨 Новые заявки: ' + d.new_leads; }
    if (msg && Notification.permission === 'granted') new Notification('CRM 3D Сервис', { body: msg });
  } catch(e) {}
}

function connectSSE() {
  const es = new EventSource(`${API}/sse/events`);
  es.onmessage = function(e) {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'new_lead') {
        showToast(`📨 Новая заявка от ${d.name} (${d.phone})`, 'info');
        if (Notification.permission === 'granted') new Notification('CRM 3D Сервис', { body: `📨 Новая заявка от ${d.name}` });
        if (_loaded['tab-leads']) loadLeads();
      }
    } catch(e) {}
  };
  es.onerror = () => { es.close(); setTimeout(connectSSE, 5000); };
}

// ==================== IMPORT / EXPORT ====================
async function importExcel(type, input) {
  const file = input.files[0];
  if (!file) return;
  const fd = new FormData(); fd.append('file', file);
  const r = await (await fetch(`${API}/export/import/${type}`, { method: 'POST', body: fd })).json();
  if (r?.imported) {
    showToast('Импортировано: ' + r.imported);
    if (type === 'clients') loadClients();
    else if (type === 'services') loadServices();
    else if (type === 'warehouse') loadProducts();
  }
  input.value = '';
}

// ==================== DRAFTS ====================
function saveDraft(key, data) { try { localStorage.setItem('draft_' + key, JSON.stringify(data)); } catch(e) {} }
function loadDraft(key) { try { const d = localStorage.getItem('draft_' + key); return d ? JSON.parse(d) : null; } catch(e) { return null; } }
function clearDraft(key) { localStorage.removeItem('draft_' + key); }
let _draftTimers = {};
function attachDraftAutoSave(formId, draftKey) {
  const form = document.getElementById(formId);
  if (!form) return;
  const inputs = form.querySelectorAll('input,textarea,select');
  inputs.forEach(el => {
    el.addEventListener('change', () => debounceSaveDraft(draftKey, formId));
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.addEventListener('input', () => debounceSaveDraft(draftKey, formId));
  });
}
function debounceSaveDraft(key, formId) {
  clearTimeout(_draftTimers[key]);
  _draftTimers[key] = setTimeout(() => {
    const form = document.getElementById(formId);
    if (!form) return;
    const data = {};
    form.querySelectorAll('input,textarea,select').forEach(el => {
      if (el.type === 'checkbox') data[el.id] = el.checked;
      else if (el.type !== 'file') data[el.id] = el.value;
    });
    saveDraft(key, data);
  }, 500);
}
